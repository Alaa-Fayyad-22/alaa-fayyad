  <!-- ===== wordmark ===== -->
  <text x="556" y="350" font-family="Arial, Helvetica, sans-serif" font-size="110" font-weight="800" fill="#f7f4ec" letter-spacing="1">Fattoura</text>
  <text x="560" y="398" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="400" fill="#9fa392">Splitting, the easy way</text>

  <!-- people dots motif -->
  <g transform="translate(562 444)">
    <circle cx="0"   cy="0" r="9" fill="#d8552e"/>
    <circle cx="30"  cy="0" r="9" fill="#3f7d56"/>
    <circle cx="60"  cy="0" r="9" fill="#2f6f9f"/>
    <circle cx="90"  cy="0" r="9" fill="#b8852b"/>
    <circle cx="120" cy="0" r="9" fill="#8b4a8f"/>
    <circle cx="150" cy="0" r="9" fill="#c2406a"/>
  </g>
